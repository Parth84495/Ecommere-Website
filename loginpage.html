<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Login Page</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, Helvetica, sans-serif;
}

/* Header */

header{
position:absolute;
top:0;
left:0;
width:100%;
padding:15px 40px;
display:flex;
justify-content:space-between;
align-items:center;
}

/* Logo */

.logo{
display:flex;
align-items:center;
color:white;
font-size:22px;
font-weight:bold;
}

.logo img{
width:40px;
margin-right:10px;
}

/* Navigation */

.nav-links a{
margin-left:20px;
color:white;
text-decoration:none;
font-weight:bold;
transition:0.3s;
}

.nav-links a:hover{
color:#00c6ff;
}

/* Background */

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:url('banner.png') 
no-repeat center center/cover;
}

/* 3D Container */

.container{
perspective:1000px;
}

/* Login Box */

.login-box{
width:350px;
padding:40px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
border-radius:15px;
box-shadow:0 25px 45px rgba(0,0,0,0.3);
transform-style:preserve-3d;
transition:0.5s;
}

.login-box:hover{
transform:rotateY(10deg) rotateX(5deg);
}

.login-box h2{
text-align:center;
margin-bottom:30px;
color:white;
}

/* Input Fields */

.input-box{
position:relative;
margin-bottom:25px;
}

.input-box input{
width:100%;
padding:12px;
border:none;
outline:none;
border-radius:8px;
background:rgba(255,255,255,0.2);
color:white;
}

.input-box label{
position:absolute;
top:-20px;
left:5px;
color:white;
font-size:14px;
}

/* Button */

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:linear-gradient(45deg,#00c6ff,#0072ff);
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

/* Forgot Password */

.forgot{
text-align:right;
margin-top:10px;
}

.forgot a{
color:white;
text-decoration:none;
font-size:14px;
}

.forgot a:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<!-- Header -->

<header>

<div class="logo">
<img src="logo.jpeg">
E-SHOP
</div>

<div class="nav-links">
<a href="#" id="loginToggle">Login</a>
<a href="#" id="registerToggle">Sign Up</a>
</div>

</header>


<!-- Auth Form -->

<div class="container">
<div class="login-box">

<h2 id="formTitle">Login</h2>

<form id="authForm" data-mode="login">

<div class="input-box register-only" id="nameField" style="display:none;">
<label>Name</label>
<input id="name" type="text" placeholder="Enter your full name">
</div>

<div class="input-box">
<label>Email</label>
<input id="email" type="email" placeholder="Enter your email" required>
</div>

<div class="input-box">
<label>Password</label>
<input id="password" type="password" placeholder="Enter your password" required>
</div>

<div class="input-box register-only" id="phoneField" style="display:none;">
<label>Phone Number</label>
<input id="phone" type="tel" placeholder="Enter your phone number">
</div>

<div class="input-box register-only" id="dobField" style="display:none;">
<label>Date of Birth</label>
<input id="dob" type="date" placeholder="Enter your date of birth">
</div>

<button type="submit" id="submitButton">Login</button>

<div class="forgot" id="forgotSection">
<a href="#">Forgot Password?</a>
</div>

<div class="switch-message" id="switchMessage" style="margin-top:16px; font-size:14px; color:white;"></div>

</form>

</div>
</div>

<script>
function getUserData() {
  const stored = localStorage.getItem('eshopUser');
  return stored ? JSON.parse(stored) : null;
}

function isUserLoggedIn() {
  return localStorage.getItem('eshopLoggedIn') === 'true';
}

function redirectIfLoggedIn() {
  if (isUserLoggedIn()) {
    window.location.href = 'products.html';
  }
}

function showForm(mode) {
  const title = document.getElementById('formTitle');
  const form = document.getElementById('authForm');
  const submitButton = document.getElementById('submitButton');
  const forgotSection = document.getElementById('forgotSection');
  const switchMessage = document.getElementById('switchMessage');
  const registerFields = document.querySelectorAll('.register-only');

  form.dataset.mode = mode;
  if (mode === 'register') {
    title.textContent = 'Register';
    submitButton.textContent = 'Register';
    forgotSection.style.display = 'none';
    switchMessage.innerHTML = 'Already have an account? <a href="#" id="switchToLogin">Login here</a>.';
    registerFields.forEach(field => field.style.display = 'block');
  } else {
    title.textContent = 'Login';
    submitButton.textContent = 'Login';
    forgotSection.style.display = 'block';
    switchMessage.innerHTML = 'New user? <a href="#" id="switchToRegister">Create an account</a>.';
    registerFields.forEach(field => field.style.display = 'none');
  }

  const switchToLogin = document.getElementById('switchToLogin');
  const switchToRegister = document.getElementById('switchToRegister');

  if (switchToLogin) {
    switchToLogin.addEventListener('click', function(event) {
      event.preventDefault();
      showForm('login');
    });
  }
  if (switchToRegister) {
    switchToRegister.addEventListener('click', function(event) {
      event.preventDefault();
      showForm('register');
    });
  }
}

function handleFormSubmit(event) {
  event.preventDefault();
  const form = event.target;
  const mode = form.dataset.mode;
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const dob = document.getElementById('dob').value;

  if (!email || !password) {
    alert('Please enter both email and password.');
    return;
  }

  if (mode === 'register') {
    if (!name || !phone || !dob) {
      alert('Please enter your name, phone number, and date of birth.');
      return;
    }

    const user = { name, email, password, phone, dob };
    localStorage.setItem('eshopUser', JSON.stringify(user));
    localStorage.setItem('eshopLoggedIn', 'true');
    window.location.href = 'products.html';
    return;
  }

  const existingUser = getUserData();
  if (!existingUser) {
    alert('No account found. Please register first.');
    showForm('register');
    return;
  }

  if (existingUser.email !== email) {
    alert('Invalid email.');
    return;
  }

  localStorage.setItem('eshopLoggedIn', 'true');
  window.location.href = 'products.html';
}

function initAuthPage() {
  redirectIfLoggedIn();
  showForm('login');
  document.getElementById('authForm').addEventListener('submit', handleFormSubmit);
  document.getElementById('loginToggle').addEventListener('click', function(event) {
    event.preventDefault();
    showForm('login');
  });
  document.getElementById('registerToggle').addEventListener('click', function(event) {
    event.preventDefault();
    showForm('register');
  });
}

document.addEventListener('DOMContentLoaded', initAuthPage);
</script>

</body>
</html>
